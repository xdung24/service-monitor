{{ define "setup.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setup — Conductor</title>
    {{ template "styles" . }}
</head>
<body>
    <div style="max-width:400px; margin:4rem auto; padding:1rem;">
        <div style="text-align:center; margin-bottom:2rem;">
            <h1 style="font-size:1.5rem; font-weight:700; color:#f1f5f9;">&#9829; <span style="color:#38bdf8;">Service</span>Monitor</h1>
        </div>
        <div class="card">
            <h2 style="font-size:1.25rem; font-weight:700; margin-bottom:0.5rem; text-align:center;">Welcome!</h2>
            <p class="text-muted" style="text-align:center; margin-bottom:1.5rem;">Create your admin account to get started.</p>
            {{ if .Error }}
            <div class="alert alert-danger">{{ .Error }}</div>
            {{ end }}
            <form method="POST" action="/setup">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input class="form-control" type="text" id="username" name="username"
                           autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password"
                           autocomplete="new-password" required minlength="8" />
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input class="form-control" type="password" id="confirm_password" name="confirm_password"
                           autocomplete="new-password" required minlength="8" />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;">
                    Create Account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
{{ end }}
