# .golangci.yml — golangci-lint v2 configuration for conductor
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # suspicious constructs
    - ineffassign     # useless assignments
    - staticcheck     # comprehensive static analysis (includes gosimple + unused in v2)
    - gocritic        # broad code quality suggestions
    - gochecknoinits  # flag func init() unless intentional
    - gosec           # security issues (SQL injection, SSRF, hardcoded creds…)
    - bodyclose       # HTTP response body not closed
    - noctx           # HTTP calls without context
    - misspell        # common spelling mistakes in comments/strings
    - whitespace      # leading/trailing blank lines

  settings:
    govet:
      enable:
        - shadow
        - nilness
      disable:
        - fieldalignment  # not enforced — struct layout is a minor optimisation

    gosec:
      excludes:
        - G402  # TLS InsecureSkipVerify — intentional user opt-in (smtp_ignore_tls / http_ignore_tls)

    gocritic:
      disabled-checks:
        - commentedOutCode
        - hugeParam

    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*database/sql.Rows).Close

    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files get relaxed rules.
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic
