# .golangci.yml — golangci-lint configuration for service-monitor

run:
  timeout: 5m
  # Only analyse changed files on PRs (faster); CI runs full analysis.
  # Configured in the workflow via --new-from-rev when needed.

linters:
  enable:
    - errcheck        # unanticipated unchecked errors
    - gosimple        # simplify code
    - govet           # suspicious constructs (includes printf format checks)
    - ineffassign     # useless assignments
    - staticcheck     # comprehensive static analysis
    - unused          # unused code (funcs, vars, consts, types)
    - gocritic        # broad code quality suggestions
    - gochecknoinits  # flag func init() unless intentional
    - gosec           # security issues (SQL injection, SSRF, hardcoded creds…)
    - bodyclose       # HTTP response body not closed
    - noctx           # HTTP calls without context
    - misspell        # common spelling mistakes in comments/strings
    - whitespace      # leading/trailing blank lines
    - gofmt           # formatting (reports only — formatter not auto-applied)

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment  # not enforced — struct layout is a minor optimisation

  gosec:
    excludes:
      - G402  # TLS InsecureSkipVerify — intentional user opt-in (e.g. smtp_ignore_tls)

  gocritic:
    disabled-checks:
      - commentedOutCode
      - hugeParam

  errcheck:
    # Ignore certain common patterns where errors are intentionally discarded.
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*database/sql.Rows).Close

  misspell:
    locale: US

issues:
  # Show all issues, not just the first 3 per linter.
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files get relaxed rules.
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic

    # Migration SQL embed files are not Go — no lint needed.
    - path: migrations/
      linters:
        - all
