name: "AI Code Review"

# Runs two complementary automated reviews on every PR:
#   1. golangci-lint via reviewdog — posts inline static-analysis comments
#   2. GitHub Copilot code review request — asks Copilot to review on first open
#      (requires Copilot code review to be enabled in repo Settings → Code review)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # -------------------------------------------------------------------------
  # Static analysis via golangci-lint, reported as inline PR review comments
  # -------------------------------------------------------------------------
  golangci-lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint (reviewdog reporter)
        uses: reviewdog/action-golangci-lint@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Pin to a specific v1 release to avoid breaking config changes in v2.
          golangci_lint_version: v1.64.8
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          # github-pr-review posts inline comments; use github-check for
          # annotations only (no PR comments permissions needed).
          reporter: github-pr-review
          level: warning
          fail_on_error: false

  # -------------------------------------------------------------------------
  # Request GitHub Copilot as a PR reviewer (first open only)
  # Requires: Settings → Code review → Copilot code review → Enabled
  # -------------------------------------------------------------------------
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: ['copilot'],
              });
              core.info(`Requested Copilot review for PR #${pr.number}`);
            } catch (e) {
              // Non-fatal: Copilot review may not be enabled for this repo.
              core.warning(`Could not request Copilot review: ${e.message}`);
            }
