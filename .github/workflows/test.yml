name: Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  # Minimum-length key for CI; sessions are ephemeral per run.
  CI_SECRET_KEY: ci-test-secret-key-minimum-32chars

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Go unit tests — always runs on PR and push                   #
  # ------------------------------------------------------------------ #
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -race -timeout 5m ./...

  # ------------------------------------------------------------------ #
  # Job 2: Bruno functional smoke — runs after unit on PR and push      #
  # ------------------------------------------------------------------ #
  functional:
    name: Functional Tests (Bruno smoke)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build server binary
        run: go build -o conductor ./cmd/server

      - name: Start Conductor server
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATA_DIR: /tmp/conductor-ci
          LISTEN_ADDR: ':3001'
        run: |
          mkdir -p /tmp/conductor-ci
          ./conductor &
          echo $! > /tmp/conductor.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/healthz || (echo "Server failed to start" && exit 1)

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno smoke collection
        working-directory: tests/functional
        run: |
          mkdir -p ../../test-results
          bru run --env ci --output ../../test-results/bruno.json 2>&1 | tee ../../test-results/bruno.log
        continue-on-error: false

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/conductor.pid) 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-results
          path: test-results/

  # ------------------------------------------------------------------ #
  # Job 3: k6 performance smoke — runs on push to main only             #
  # (skip on PR to keep PR feedback fast)                               #
  # ------------------------------------------------------------------ #
  performance:
    name: Performance Tests (k6 smoke)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build server binary
        run: go build -o conductor ./cmd/server

      - name: Start Conductor server
        env:
          SECRET_KEY: ${{ env.CI_SECRET_KEY }}
          DATA_DIR: /tmp/conductor-perf
          LISTEN_ADDR: ':3001'
        run: |
          mkdir -p /tmp/conductor-perf
          ./conductor &
          echo $! > /tmp/conductor.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/healthz || (echo "Server failed to start" && exit 1)

      - uses: grafana/setup-k6-action@v1

      - name: k6 smoke — health endpoint
        working-directory: tests/performance
        # Override stages with minimal smoke settings: 2 VUs for 20 s
        run: k6 run --vus 2 --duration 20s --env ENV=ci get-healthz.k6

      - name: k6 smoke — status summary endpoint
        working-directory: tests/performance
        run: k6 run --vus 2 --duration 20s --env ENV=ci get-status-summary.k6

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/conductor.pid) 2>/dev/null || true
