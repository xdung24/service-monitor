name: "SonarQube Analysis"

# Runs on every PR to analyse code quality and security before manual review.
#
# Required secrets (set in Settings → Secrets → Actions):
#   SONAR_TOKEN      — token from SonarCloud (https://sonarcloud.io) or self-hosted SonarQube
#   SONAR_HOST_URL   — e.g. https://sonarcloud.io  or  http://your-sonar-server:9000
#
# For SonarCloud, also set in sonar-project.properties:
#   sonar.organization=<your-sonarcloud-org>

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history required for accurate blame data and new-code detection.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go test -v ./... 2>&1 | go tool test2json > test-report.json || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
