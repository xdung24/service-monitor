# sonar-project.properties
# SonarQube / SonarCloud project configuration for service-monitor.
#
# SonarCloud users: set sonar.organization to your SonarCloud org slug
# and ensure the SONAR_HOST_URL secret points to https://sonarcloud.io.

sonar.projectKey=service-monitor
sonar.projectName=Service Monitor
sonar.projectVersion=1.0

# Source & test paths
sonar.sources=.
sonar.exclusions=\
  **/*_test.go,\
  **/vendor/**,\
  **/testdata/**,\
  **/migrations/**,\
  **/dist/**,\
  **/public/**,\
  **/cmd/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage report produced by: go test -coverprofile=coverage.out ./...
sonar.go.coverage.reportPaths=coverage.out

# JSON test report produced by: go test ./... 2>&1 | go tool test2json > test-report.json
sonar.go.tests.reportPaths=test-report.json

# Encoding
sonar.sourceEncoding=UTF-8

# SonarCloud only — set this to your org slug (matches your GitHub org/username).
# Remove or leave blank for self-hosted SonarQube.
# sonar.organization=xdung24
